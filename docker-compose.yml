services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
      - DB_PATH=/data/database.db
      - APP_URL=${APP_URL}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - data:/data
    restart: unless-stopped

volumes:
  data:
